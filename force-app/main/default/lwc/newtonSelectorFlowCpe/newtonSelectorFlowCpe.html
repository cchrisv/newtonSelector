<template>
  <div class="newton-cpe">
    <!-- Validation errors strip -->
    <template lwc:if={hasValidationErrors}>
      <div class="newton-cpe__errors" role="alert">
        <c-newton-selector-icon
          name="circle-alert"
          size="x-small"
          box="option"
          variant="error"
          alternative-text="Errors"
        ></c-newton-selector-icon>
        <ul class="newton-cpe__errors-list">
          <template for:each={validationMessages} for:item="msg">
            <li key={msg.key}>{msg.message}</li>
          </template>
        </ul>
      </div>
    </template>

    <!-- Configured state · readable summary -->
    <template lwc:if={hasDataSource}>
      <button
        type="button"
        class="newton-cpe__cta"
        onclick={handleOpenConfigure}
      >
        <c-newton-selector-icon
          name="settings-2"
          size="x-small"
          box="button"
          alternative-text=""
        ></c-newton-selector-icon>
        <span>Edit configuration</span>
      </button>

      <article
        class="newton-cpe__card"
        aria-label="Selector configuration summary"
      >
        <header class="newton-cpe__card-head">
          <p class="newton-cpe__card-eyebrow">Newton Selector</p>
          <h2 class="newton-cpe__card-title">Current configuration</h2>
        </header>

        <!-- Data source -->
        <template lwc:if={dataSection}>
          <section class="newton-cpe__section">
            <h3 class="newton-cpe__section-title">Data source</h3>
            <p class="newton-cpe__section-kind">{dataSection.kind}</p>
            <template for:each={dataSection.lines} for:item="line">
              <p
                key={line.key}
                class="newton-cpe__line"
                data-muted={line.muted}
                data-mono={line.mono}
              >
                {line.text}
              </p>
            </template>
          </section>
        </template>

        <!-- Label -->
        <section class="newton-cpe__section">
          <h3 class="newton-cpe__section-title">Label</h3>
          <template for:each={labelSection.lines} for:item="line">
            <p key={line.key} class="newton-cpe__line" data-muted={line.muted}>
              {line.text}
            </p>
          </template>
        </section>

        <!-- Behavior -->
        <section class="newton-cpe__section">
          <h3 class="newton-cpe__section-title">Behavior</h3>
          <template for:each={behaviorLines} for:item="line">
            <p key={line.key} class="newton-cpe__line" data-muted={line.muted}>
              {line.text}
            </p>
          </template>
        </section>

        <!-- Appearance -->
        <section class="newton-cpe__section">
          <h3 class="newton-cpe__section-title">Appearance</h3>
          <template for:each={appearanceLines} for:item="line">
            <p key={line.key} class="newton-cpe__line" data-muted={line.muted}>
              {line.text}
            </p>
          </template>
        </section>
      </article>
    </template>

    <!-- Empty state · first-use CTA -->
    <template lwc:else>
      <div class="newton-cpe__empty">
        <span class="newton-cpe__empty-glyph" aria-hidden="true">
          <c-newton-selector-icon
            name="list"
            size="small"
            box="tile"
            alternative-text=""
          ></c-newton-selector-icon>
        </span>
        <p class="newton-cpe__empty-title">Not configured yet</p>
        <p class="newton-cpe__empty-copy">
          Pick a data source, layout, and behavior to build your tile selector.
        </p>
        <button
          type="button"
          class="newton-cpe__cta newton-cpe__cta_primary"
          onclick={handleOpenConfigure}
        >
          <c-newton-selector-icon
            name="settings-2"
            size="x-small"
            box="button"
            alternative-text=""
          ></c-newton-selector-icon>
          <span>Configure selector</span>
        </button>
      </div>
    </template>
  </div>
</template>
