<template>
  <div class="newton-group-wrapper">
    <template lwc:if={showOuterSearch}>
      <div class="newton-search-bar">
        <c-newton-selector-icon
          name="search"
          size="sm"
          box="input"
        ></c-newton-selector-icon>
        <input
          type="search"
          class="newton-search-bar__input"
          placeholder="Search"
          value={_searchTerm}
          oninput={handleSearch}
          aria-label="Filter items"
        />
      </div>
    </template>

    <template lwc:if={showToolbar}>
      <div class="newton-toolbar">
        <button
          type="button"
          class="slds-button slds-button_neutral newton-toolbar__btn"
          onclick={handleSelectAll}
        >
          Select all
        </button>
        <button
          type="button"
          class="slds-button slds-button_neutral newton-toolbar__btn"
          onclick={handleClearAll}
        >
          Clear all
        </button>
      </div>
    </template>

    <template lwc:if={isBasicCardLayout}>
      <div
        class={groupClass}
        style={groupStyle}
        role={groupRole}
        oncardselect={handleCardSelect}
      >
        <template for:each={decoratedItems} for:item="item">
          <c-newton-selector-choice-tile
            key={item.id}
            item={item}
            variant={choiceTileVariant}
            selected={item._selected}
            disabled={item._disabled}
            selection-mode={selectionMode}
            group-name={_groupName}
            size={size}
            aspect-ratio={aspectRatio}
            badge-position={badgePosition}
            badge-variant={badgeVariant}
            badge-shape={badgeShape}
            selection-indicator={selectionIndicator}
            elevation={elevation}
            pattern={pattern}
            pattern-tone={patternTone}
            pattern-hover-tone={patternHoverTone}
            pattern-selected-tone={patternSelectedTone}
            pattern-disabled-tone={patternDisabledTone}
            corner-style={cornerStyle}
            corner-tone={cornerTone}
            surface-style={surfaceStyle}
            surface-tone={surfaceTone}
            surface-hover-tone={surfaceHoverTone}
            surface-selected-tone={surfaceSelectedTone}
            surface-disabled-tone={surfaceDisabledTone}
            icon-decor={iconDecor}
            icon-style={iconStyle}
            icon-shading={iconShading}
            icon-tone={iconTone}
            icon-tone-hex={iconToneHex}
            icon-glyph-tone={iconGlyphTone}
            icon-glyph-tone-hex={iconGlyphToneHex}
            icon-size={iconSize}
            pattern-tone-hex={patternToneHex}
            pattern-hover-tone-hex={patternHoverToneHex}
            pattern-selected-tone-hex={patternSelectedToneHex}
            pattern-disabled-tone-hex={patternDisabledToneHex}
            corner-tone-hex={cornerToneHex}
            surface-tone-hex={surfaceToneHex}
            surface-hover-tone-hex={surfaceHoverToneHex}
            surface-selected-tone-hex={surfaceSelectedToneHex}
            surface-disabled-tone-hex={surfaceDisabledToneHex}
            badge-variant-hex={badgeVariantHex}
            show-icons={showIcons}
            show-badges={showBadges}
          ></c-newton-selector-choice-tile>
        </template>
        <template lwc:if={isEmpty}>
          <div class="newton-empty">
            <c-newton-selector-icon
              name="search"
              size="sm"
              box="tile"
            ></c-newton-selector-icon>
            <p>No items to display.</p>
          </div>
        </template>
      </div>
    </template>

    <template lwc:if={isPicklist}>
      <div class={picklistClass} style={groupStyle}>
        <c-newton-selector-combobox
          class="newton-picklist__combobox"
          open={_picklistOpen}
          dropdown-id={picklistListboxId}
          dropdown-label="Picklist options"
          dropdown-class="newton-picklist__menu"
          aria-multiselectable={picklistAriaMultiselectable}
        >
          <div slot="trigger" class={picklistInputContainerClass} role="none">
            <template lwc:if={selectedPicklistIcon}>
              <span
                class="slds-icon_container slds-combobox__input-entity-icon newton-picklist__selected-icon"
                aria-hidden="true"
              >
                <c-newton-selector-icon
                  name={selectedPicklistIcon}
                  size="x-small"
                  box="input"
                ></c-newton-selector-icon>
              </span>
            </template>

            <button
              id={picklistInputId}
              class={picklistInputClass}
              type="button"
              role="combobox"
              aria-haspopup="listbox"
              aria-controls={picklistListboxId}
              aria-expanded={picklistExpanded}
              aria-label={picklistAriaLabel}
              title={picklistInputTitle}
              onkeydown={handlePicklistKeydown}
              onclick={handlePicklistToggle}
            >
              <span class="slds-truncate">{picklistButtonLabel}</span>
            </button>

            <span
              class="slds-icon_container slds-input__icon slds-input__icon_right newton-picklist__chevron"
              aria-hidden="true"
            >
              <c-newton-selector-icon
                name={picklistChevron}
                size="x-small"
                box="input"
              ></c-newton-selector-icon>
            </span>
          </div>

          <div
            slot="dropdown"
            class="newton-picklist__menu"
            oncardselect={handlePicklistCardSelect}
          >
            <template lwc:if={enableSearch}>
              <div class="slds-form-element newton-picklist__search">
                <div
                  class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left"
                >
                  <span
                    class="slds-icon_container slds-input__icon slds-input__icon_left"
                    aria-hidden="true"
                  >
                    <c-newton-selector-icon
                      name="search"
                      size="x-small"
                      box="input"
                    ></c-newton-selector-icon>
                  </span>
                  <input
                    type="search"
                    class="slds-input newton-picklist__search-input"
                    placeholder="Search options"
                    value={_searchTerm}
                    oninput={handleSearch}
                    aria-label="Filter picklist options"
                  />
                </div>
              </div>
            </template>
            <template lwc:if={hasPicklistItems}>
              <ul
                class="slds-listbox slds-listbox_vertical newton-picklist__listbox"
                role="presentation"
              >
                <template for:each={picklistItems} for:item="item">
                  <li key={item.id} class={item._class} role="presentation">
                    <div
                      class="slds-listbox__option newton-picklist__option"
                      role="option"
                      aria-selected={item._ariaSelected}
                      aria-disabled={item._ariaDisabled}
                      data-value={item.value}
                      onclick={handlePicklistOptionSelect}
                    >
                      <c-newton-selector-flow-cpe-lookup-choice-option
                        row={item}
                        search-term={_searchTerm}
                        selected={item._selected}
                      ></c-newton-selector-flow-cpe-lookup-choice-option>
                    </div>
                  </li>
                </template>
              </ul>
            </template>
            <template lwc:else>
              <p class="newton-picklist__empty">No options to display.</p>
            </template>
          </div>
        </c-newton-selector-combobox>
      </div>
    </template>

    <template lwc:if={isRadio}>
      <div
        class={groupClass}
        style={groupStyle}
        role={groupRole}
        oncardselect={handleCardSelect}
      >
        <template for:each={radioItems} for:item="item">
          <div key={item.id} class={item._radioClass}>
            <span class="newton-radio-card__marker" aria-hidden="true"></span>
            <c-newton-selector-choice-tile
              item={item}
              variant={choiceTileVariant}
              selected={item._selected}
              disabled={item._disabled}
              selection-mode={selectionMode}
              group-name={_groupName}
              size={size}
              aspect-ratio={aspectRatio}
              badge-position={badgePosition}
              badge-variant={badgeVariant}
              badge-shape={badgeShape}
              selection-indicator={selectionIndicator}
              elevation={elevation}
              pattern={pattern}
              pattern-tone={patternTone}
              pattern-hover-tone={patternHoverTone}
              pattern-selected-tone={patternSelectedTone}
              pattern-disabled-tone={patternDisabledTone}
              corner-style={cornerStyle}
              corner-tone={cornerTone}
              surface-style={surfaceStyle}
              surface-tone={surfaceTone}
              surface-hover-tone={surfaceHoverTone}
              surface-selected-tone={surfaceSelectedTone}
              surface-disabled-tone={surfaceDisabledTone}
              icon-decor={iconDecor}
              icon-style={iconStyle}
              icon-shading={iconShading}
              icon-tone={iconTone}
              icon-tone-hex={iconToneHex}
              icon-glyph-tone={iconGlyphTone}
              icon-glyph-tone-hex={iconGlyphToneHex}
              icon-size={iconSize}
              pattern-tone-hex={patternToneHex}
              pattern-hover-tone-hex={patternHoverToneHex}
              pattern-selected-tone-hex={patternSelectedToneHex}
              pattern-disabled-tone-hex={patternDisabledToneHex}
              corner-tone-hex={cornerToneHex}
              surface-tone-hex={surfaceToneHex}
              surface-hover-tone-hex={surfaceHoverToneHex}
              surface-selected-tone-hex={surfaceSelectedToneHex}
              surface-disabled-tone-hex={surfaceDisabledToneHex}
              badge-variant-hex={badgeVariantHex}
              show-icons={showIcons}
              show-badges={showBadges}
            ></c-newton-selector-choice-tile>
          </div>
        </template>
        <template lwc:if={isRadioEmpty}>
          <div class="newton-empty">
            <c-newton-selector-icon
              name="search"
              size="sm"
              box="tile"
            ></c-newton-selector-icon>
            <p>No items to display.</p>
          </div>
        </template>
      </div>
    </template>

    <template lwc:if={isTransferLayout}>
      <div class={transferClass} style={groupStyle} role="group">
        <section
          class={availablePanelClass}
          data-zone="available"
          aria-label={availablePanelAriaLabel}
          ondragover={handleDragOver}
          ondragleave={handleDragLeave}
          ondrop={handleDrop}
        >
          <header class="newton-transfer__head">
            <span class="newton-transfer__label">{availablePanelLabel}</span>
            <span class="newton-transfer__count">{availableCountLabel}</span>
          </header>
          <template lwc:if={enableSearch}>
            <div class="newton-transfer__search">
              <c-newton-selector-icon
                name="search"
                size="sm"
                box="input"
              ></c-newton-selector-icon>
              <input
                type="search"
                class="newton-search-bar__input"
                placeholder="Filter available"
                value={_searchTerm}
                oninput={handleSearch}
                aria-label="Filter available options"
              />
            </div>
          </template>
          <div
            class="newton-transfer__list"
            role="listbox"
            aria-label="Available options"
            oncardselect={handleAvailableCardSelect}
          >
            <template lwc:if={hasAvailableItems}>
              <template for:each={transferAvailableItems} for:item="item">
                <div
                  key={item.id}
                  class={item._class}
                  data-value={item.value}
                  draggable={item._draggable}
                  ondragstart={handleDragStart}
                >
                  <c-newton-selector-choice-tile
                    item={item}
                    variant={choiceTileVariant}
                    selected={item._selected}
                    disabled={item._disabled}
                    selection-mode={selectionMode}
                    group-name={_groupName}
                    size={size}
                    aspect-ratio={aspectRatio}
                    badge-position={badgePosition}
                    badge-variant={badgeVariant}
                    badge-shape={badgeShape}
                    selection-indicator={selectionIndicator}
                    elevation={elevation}
                    pattern={pattern}
                    pattern-tone={patternTone}
                    pattern-hover-tone={patternHoverTone}
                    pattern-selected-tone={patternSelectedTone}
                    pattern-disabled-tone={patternDisabledTone}
                    corner-style={cornerStyle}
                    corner-tone={cornerTone}
                    surface-style={surfaceStyle}
                    surface-tone={surfaceTone}
                    surface-hover-tone={surfaceHoverTone}
                    surface-selected-tone={surfaceSelectedTone}
                    surface-disabled-tone={surfaceDisabledTone}
                    icon-decor={iconDecor}
                    icon-style={iconStyle}
                    icon-shading={iconShading}
                    icon-tone={iconTone}
                    icon-tone-hex={iconToneHex}
                    icon-glyph-tone={iconGlyphTone}
                    icon-glyph-tone-hex={iconGlyphToneHex}
                    icon-size={iconSize}
                    pattern-tone-hex={patternToneHex}
                    pattern-hover-tone-hex={patternHoverToneHex}
                    pattern-selected-tone-hex={patternSelectedToneHex}
                    pattern-disabled-tone-hex={patternDisabledToneHex}
                    corner-tone-hex={cornerToneHex}
                    surface-tone-hex={surfaceToneHex}
                    surface-hover-tone-hex={surfaceHoverToneHex}
                    surface-selected-tone-hex={surfaceSelectedToneHex}
                    surface-disabled-tone-hex={surfaceDisabledToneHex}
                    badge-variant-hex={badgeVariantHex}
                    show-icons={showIcons}
                    show-badges={showBadges}
                  ></c-newton-selector-choice-tile>
                </div>
              </template>
            </template>
            <template lwc:else>
              <p class="newton-transfer__empty">{availableEmptyMessage}</p>
            </template>
          </div>
        </section>

        <template lwc:if={isDualListbox}>
          <div class="newton-transfer__controls" aria-label="Move options">
            <button
              type="button"
              class="slds-button slds-button_icon slds-button_icon-border newton-transfer__control"
              title="Move selected to chosen"
              disabled={dualAddDisabled}
              onclick={handleDualAdd}
            >
              <c-newton-selector-icon
                name="chevron-right"
                size="x-small"
                box="button"
              ></c-newton-selector-icon>
              <span class="slds-assistive-text">Move selected to chosen</span>
            </button>
            <button
              type="button"
              class="slds-button slds-button_icon slds-button_icon-border newton-transfer__control"
              title="Move all to chosen"
              disabled={dualAddAllDisabled}
              onclick={handleDualAddAll}
            >
              <c-newton-selector-icon
                name="chevrons-right"
                size="x-small"
                box="button"
              ></c-newton-selector-icon>
              <span class="slds-assistive-text">Move all to chosen</span>
            </button>
            <button
              type="button"
              class="slds-button slds-button_icon slds-button_icon-border newton-transfer__control"
              title="Remove selected"
              disabled={dualRemoveDisabled}
              onclick={handleDualRemove}
            >
              <c-newton-selector-icon
                name="chevron-left"
                size="x-small"
                box="button"
              ></c-newton-selector-icon>
              <span class="slds-assistive-text">Remove selected</span>
            </button>
            <button
              type="button"
              class="slds-button slds-button_icon slds-button_icon-border newton-transfer__control"
              title="Remove all"
              disabled={dualRemoveAllDisabled}
              onclick={handleDualRemoveAll}
            >
              <c-newton-selector-icon
                name="chevrons-left"
                size="x-small"
                box="button"
              ></c-newton-selector-icon>
              <span class="slds-assistive-text">Remove all</span>
            </button>
          </div>
        </template>

        <section
          class={selectedPanelClass}
          data-zone="selected"
          aria-label={selectedPanelAriaLabel}
          ondragover={handleDragOver}
          ondragleave={handleDragLeave}
          ondrop={handleDrop}
        >
          <header class="newton-transfer__head">
            <span class="newton-transfer__label">{selectedPanelLabel}</span>
            <span class="newton-transfer__count">{selectedCountLabel}</span>
          </header>
          <div
            class="newton-transfer__list"
            role="listbox"
            aria-label="Selected options"
            oncardselect={handleSelectedCardSelect}
          >
            <template lwc:if={hasSelectedItems}>
              <template for:each={transferSelectedItems} for:item="item">
                <div
                  key={item.id}
                  class={item._class}
                  data-value={item.value}
                  draggable={item._draggable}
                  ondragstart={handleDragStart}
                >
                  <c-newton-selector-choice-tile
                    item={item}
                    variant={choiceTileVariant}
                    selected={item._selected}
                    disabled={item._disabled}
                    selection-mode={selectionMode}
                    group-name={_groupName}
                    size={size}
                    aspect-ratio={aspectRatio}
                    badge-position={badgePosition}
                    badge-variant={badgeVariant}
                    badge-shape={badgeShape}
                    selection-indicator={selectionIndicator}
                    elevation={elevation}
                    pattern={pattern}
                    pattern-tone={patternTone}
                    pattern-hover-tone={patternHoverTone}
                    pattern-selected-tone={patternSelectedTone}
                    pattern-disabled-tone={patternDisabledTone}
                    corner-style={cornerStyle}
                    corner-tone={cornerTone}
                    surface-style={surfaceStyle}
                    surface-tone={surfaceTone}
                    surface-hover-tone={surfaceHoverTone}
                    surface-selected-tone={surfaceSelectedTone}
                    surface-disabled-tone={surfaceDisabledTone}
                    icon-decor={iconDecor}
                    icon-style={iconStyle}
                    icon-shading={iconShading}
                    icon-tone={iconTone}
                    icon-tone-hex={iconToneHex}
                    icon-glyph-tone={iconGlyphTone}
                    icon-glyph-tone-hex={iconGlyphToneHex}
                    icon-size={iconSize}
                    pattern-tone-hex={patternToneHex}
                    pattern-hover-tone-hex={patternHoverToneHex}
                    pattern-selected-tone-hex={patternSelectedToneHex}
                    pattern-disabled-tone-hex={patternDisabledToneHex}
                    corner-tone-hex={cornerToneHex}
                    surface-tone-hex={surfaceToneHex}
                    surface-hover-tone-hex={surfaceHoverToneHex}
                    surface-selected-tone-hex={surfaceSelectedToneHex}
                    surface-disabled-tone-hex={surfaceDisabledToneHex}
                    badge-variant-hex={badgeVariantHex}
                    show-icons={showIcons}
                    show-badges={showBadges}
                  ></c-newton-selector-choice-tile>
                </div>
              </template>
            </template>
            <template lwc:else>
              <p class="newton-transfer__empty">{selectedEmptyMessage}</p>
            </template>
          </div>
        </section>
      </div>
    </template>

    <template lwc:if={showManualInput}>
      <div class="slds-form-element newton-manual-input">
        <label class="slds-form-element__label" for="manual-input">
          {resolvedManualInputLabel}
        </label>
        <div class="slds-form-element__control">
          <input
            id="manual-input"
            type="text"
            class="slds-input newton-manual-input__control"
            value={manualInputValue}
            minlength={manualInputMinLength}
            maxlength={manualInputMaxLength}
            oninput={handleManualInput}
          />
        </div>
        <template lwc:if={hasManualInputHelpText}>
          <div class="slds-form-element__help">{manualInputHelpText}</div>
        </template>
      </div>
    </template>
  </div>
</template>
