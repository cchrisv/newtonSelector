<template>
  <div style={inputStyle} onmouseleave={handleInputFocus}>
    <div>
      <div class={formElementClass}>
        <div class="slds-form-element__control">
          <div class="slds-combobox_container">
            <div
              class={dropdownClass}
              data-id="resultBox"
              aria-expanded="false"
              aria-haspopup="listbox"
              role="combobox"
            >
              <div
                class="slds-form-element__control slds-input-has-icon slds-input-has-icon slds-input-has-icon_right"
                role="none"
              >
                <template if:false={displayPill}>
                  <div onkeyup={handleSearchKeyUp}>
                    <label class={labelClass} onclick={toggleMenu}
                      >{label}</label
                    >
                    <template if:true={fieldLevelHelp}>
                      <div
                        class="slds-form-element__help slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"
                      >
                        {fieldLevelHelp}
                      </div>
                    </template>
                    <lightning-input
                      class="value-input newton-selector-flow-cpe-resource-selector__value-input"
                      name="searchText"
                      type="search"
                      required={required}
                      data-input-name={name}
                      data-id="userinput"
                      variant="label-hidden"
                      value={_value}
                      disabled={disabled}
                      onchange={handleSearchField}
                      onkeydown={handleKeyDown}
                      onclick={handleOpenOptions}
                      autocomplete={autocomplete}
                      placeholder={placeholderText}
                    ></lightning-input>
                  </div>
                </template>
                <template if:true={displayPill}>
                  <label class={labelClassForPill} onclick={toggleMenu}
                    >{label}</label
                  >
                  <template if:true={fieldLevelHelp}>
                    <div
                      class="slds-form-element__help slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"
                    >
                      {fieldLevelHelp}
                    </div>
                  </template>
                  <div
                    data-input-name={name}
                    class="slds-pill_container cpe-picker-pill-wrap"
                    onclick={handleOpenOptions}
                  >
                    <lightning-pill
                      label={_value}
                      onremove={resetData}
                      has-error={hasError}
                    >
                    </lightning-pill>
                  </div>
                </template>
              </div>

              <div
                id="listbox-id-1"
                class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid"
                role="listbox"
              >
                <ul
                  class="slds-listbox slds-listbox_vertical"
                  role="presentation"
                >
                  <template if:false={_options.length}>
                    <div class="slds-p-around_small">
                      {labels.noDataAvailable}
                    </div>
                  </template>
                  <template for:each={_options} for:item="curOption">
                    <li
                      role="presentation"
                      class="slds-listbox__item"
                      key={curOption.type}
                    >
                      <div
                        class="slds-p-around_xx-small custom-text-transform_uppercase"
                      >
                        <c-newton-selector-icon
                          name="chevron-left"
                          class="newton-selector-flow-cpe-resource-selector__icon-small"
                          size="x-small"
                          box="button"
                          onclick={resetData}
                        ></c-newton-selector-icon>
                        {curOption.type}
                      </div>
                      <template
                        for:each={curOption.options}
                        for:item="curOptionElement"
                      >
                        <div
                          key={curOptionElement.key}
                          class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta"
                          role="option"
                        >
                          <span
                            data-value={curOptionElement.value}
                            data-flow-type={curOptionElement.flowType}
                            data-object-type={curOptionElement.objectType}
                            data-is-collection={curOptionElement.isCollection}
                            onclick={handleSetSelectedRecord}
                            class="slds-media__body newton-selector-flow-cpe-resource-selector__option-body"
                          >
                            <c-newton-selector-flow-cpe-lookup-choice-option
                              row={curOptionElement}
                            ></c-newton-selector-flow-cpe-lookup-choice-option>
                          </span>
                          <c-newton-selector-icon
                            if:true={curOptionElement.isObject}
                            data-option-value={curOptionElement.value}
                            data-object-type={curOptionElement.objectType}
                            name="chevron-right"
                            class="newton-selector-flow-cpe-resource-selector__chevron"
                            size="x-small"
                            box="button"
                            onclick={handleOpenObject}
                          ></c-newton-selector-icon>

                          <c-newton-selector-icon
                            if:true={curOptionElement.storeOutputAutomatically}
                            data-option-value={curOptionElement.value}
                            data-object-type={curOptionElement.objectType}
                            name="chevron-right"
                            class="newton-selector-flow-cpe-resource-selector__chevron"
                            size="x-small"
                            box="button"
                            onclick={handleOpenScreenComponent}
                          ></c-newton-selector-icon>

                          <c-newton-selector-icon
                            if:true={curOptionElement.globalVariable}
                            data-option-value={curOptionElement.value}
                            data-object-type={curOptionElement.objectType}
                            name="chevron-right"
                            class="newton-selector-flow-cpe-resource-selector__chevron"
                            size="x-small"
                            box="button"
                            onclick={handleOpenGlobalVariable}
                          ></c-newton-selector-icon>
                        </div>
                      </template>
                    </li>
                  </template>
                </ul>
              </div>
            </div>
          </div>
        </div>
        <template if:true={hasError}>
          <div class="slds-form-element__help slds-m-top_large">
            {labels.invalidReferenceError}
          </div>
        </template>
      </div>
    </div>
  </div>
</template>
