        </header>
        <div
          class="slds-card__body slds-card__body_inner newton-studio__field-block"
        >
          <template lwc:if={marginLinked}>
            <div
              class="newton-studio__selectorgroup newton-studio__selectorgroup_compact"
              role="radiogroup"
              aria-label="Margin — all sides"
              oncardselect={handleMarginAllChange}
            >
              <template for:each={marginAllTiles} for:item="tile">
                <c-newton-selector-choice-tile
                  key={tile.id}
                  item={tile}
                  selected={tile._selected}
                  selection-mode="single"
                  group-name="newton-margin-all"
                  size="small"
                  aspect-ratio="3:4"
                  icon-size="small"
                ></c-newton-selector-choice-tile>
              </template>
            </div>
          </template>
          <template lwc:else>
            <template for:each={marginSideSections} for:item="section">
              <div
                key={section.side}
                class="newton-studio__axis"
                data-section-side={section.side}
              >
                <div class="newton-studio__axis-head">
                  <c-newton-selector-icon
                    name={section.icon}
                    size="x-small"
                    alternative-text=""
                  ></c-newton-selector-icon>
                  <div class="newton-studio__axis-text">
                    <h4 class="newton-studio__axis-title">{section.label}</h4>
                  </div>
                </div>
                <div
                  class="newton-studio__selectorgroup newton-studio__selectorgroup_compact"
                  role="radiogroup"
                  aria-label={section.label}
                  data-side={section.side}
                  oncardselect={handleMarginSideChange}
                >
                  <template for:each={section.tiles} for:item="tile">
                    <c-newton-selector-choice-tile
                      key={tile.id}
                      item={tile}
                      selected={tile._selected}
                      selection-mode="single"
                      group-name="newton-margin-side"
                      size="small"
                      aspect-ratio="1:1"
                      icon-size="small"
                    ></c-newton-selector-choice-tile>
                  </template>
                </div>
              </div>
            </template>
          </template>
        </div>
      </article>

      <article
        class="slds-card newton-studio__card newton-studio__section-card newton-studio__section-card_spacing"
      >
        <header
          class="slds-card__header newton-card__head newton-card__head_with-action"
        >
          <span
            class="newton-card__glyph newton-card__glyph_appearance"
            aria-hidden="true"
          >
            <c-newton-selector-icon
              name="shrink"
              size="small"
              alternative-text=""
            ></c-newton-selector-icon>
          </span>
          <div class="newton-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              Inner tile padding
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              Space inside each tile between its border and content.
            </p>
          </div>
          <span class="newton-card__action">
            <c-newton-selector-flow-cpe-toggle
              label="Link all sides"
              variant="label-hidden"
              active-label="Linked"
              inactive-label="Per side"
              message-toggle-active="All four sides share one value"
              message-toggle-inactive="Set each side independently"
              checked={paddingLinked}
              ontoggle={handlePaddingLinkToggle}
            ></c-newton-selector-flow-cpe-toggle>
          </span>
          <lightning-helptext
            class="newton-card__help"
            content="Padding drives the content gap too — the space between icon and text is always half the padding. Pick Auto to follow the tile size's default."
          ></lightning-helptext>
        </header>
        <div
          class="slds-card__body slds-card__body_inner newton-studio__field-block"
        >
          <template lwc:if={paddingLinked}>
            <div
              class="newton-studio__selectorgroup newton-studio__selectorgroup_compact"
              role="radiogroup"
              aria-label="Padding — all sides"
              oncardselect={handlePaddingAllChange}
            >
              <template for:each={paddingAllTiles} for:item="tile">
                <c-newton-selector-choice-tile
                  key={tile.id}
                  item={tile}
                  selected={tile._selected}
                  selection-mode="single"
                  group-name="newton-padding-all"
                  size="small"
                  aspect-ratio="3:4"
                  icon-size="small"
                ></c-newton-selector-choice-tile>
              </template>
            </div>
          </template>
          <template lwc:else>
            <template for:each={paddingSideSections} for:item="section">
              <div
                key={section.side}
                class="newton-studio__axis"
                data-section-side={section.side}
              >
                <div class="newton-studio__axis-head">
                  <c-newton-selector-icon
                    name={section.icon}
                    size="x-small"
                    alternative-text=""
                  ></c-newton-selector-icon>
                  <div class="newton-studio__axis-text">
                    <h4 class="newton-studio__axis-title">{section.label}</h4>
                  </div>
                </div>
                <div
                  class="newton-studio__selectorgroup newton-studio__selectorgroup_compact"
                  role="radiogroup"
                  aria-label={section.label}
                  data-side={section.side}
                  oncardselect={handlePaddingSideChange}
                >
                  <template for:each={section.tiles} for:item="tile">
                    <c-newton-selector-choice-tile
                      key={tile.id}
                      item={tile}
                      selected={tile._selected}
                      selection-mode="single"
                      group-name="newton-padding-side"
                      size="small"
                      aspect-ratio="1:1"
                      icon-size="small"
                    ></c-newton-selector-choice-tile>
                  </template>
                </div>
              </div>
            </template>
          </template>
        </div>
      </article>
    </template>
  </template>
</template>
