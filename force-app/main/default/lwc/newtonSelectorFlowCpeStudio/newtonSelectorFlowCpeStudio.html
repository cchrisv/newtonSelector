<template>
  <div class="newton-studio" style={gridStyle}>
    <div class="newton-studio__body">
      <aside class="newton-studio__left" aria-label="Component preview">
        <slot name="preview"></slot>
      </aside>

      <div
        class="newton-studio__splitter"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize preview panel"
        aria-valuemin={leftAriaValueMin}
        aria-valuemax={leftAriaValueMax}
        aria-valuenow={leftAriaValueNow}
        tabindex="0"
        onpointerdown={handleSplitterPointerDown}
        onpointermove={handleSplitterPointerMove}
        onpointerup={handleSplitterPointerUp}
        onpointercancel={handleSplitterPointerUp}
        onkeydown={handleSplitterKeyDown}
      >
        <span class="newton-studio__splitter-grip" aria-hidden="true"></span>
      </div>

      <section class="newton-studio__controls">
        <slot name="controls" onslotchange={handleControlsSlotChange}></slot>
      </section>
    </div>
  </div>
</template>
