<template>
  <span class={optionClass}>
    <span class="newton-visual-lookup-option__icon" aria-hidden="true">
      <c-newton-selector-icon
        name={iconName}
        size="small"
        box="tile"
        alternative-text=""
      ></c-newton-selector-icon>
    </span>

    <span class="newton-visual-lookup-option__body">
      <span class="newton-visual-lookup-option__title">
        <template for:each={titleTokens} for:item="token">
          <span key={token.key}>
            <mark
              lwc:if={token.isHighlight}
              class="newton-visual-lookup-option__mark"
              >{token.text}</mark
            >
            <template lwc:else>{token.text}</template>
          </span>
        </template>
      </span>
      <span lwc:if={subtitleLine} class="newton-visual-lookup-option__meta">
        {subtitleLine}
      </span>
    </span>

    <span
      lwc:if={showBadge}
      class="slds-badge newton-visual-lookup-option__badge"
    >
      {badge}
    </span>
  </span>
</template>
